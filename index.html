<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0E1116" />
    <meta name="description" content="Sandoq · صندوق التداول - تطبيق تداول شخصي متصل بـ Pionex" />
    
    <title>Sandoq · صندوق التداول</title>

    <!-- خطوط Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
      /* إعدادات عامة */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #0E1116;
        color: #E6EDF3;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
      }

      /* تخصيص شريط التمرير */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #161B22;
      }
      ::-webkit-scrollbar-thumb {
        background: #262C36;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3D4452;
      }

      /* تخصيص الحقول */
      input[type="number"],
      input[type="password"],
      input[type="text"] {
        font-family: 'Cairo', 'Segoe UI', sans-serif;
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }

      /* تحسين الأزرار */
      button {
        font-family: 'Cairo', 'Segoe UI', sans-serif;
        transition: all 0.2s ease;
      }
      button:hover:not(:disabled) {
        transform: scale(1.02);
        opacity: 0.9;
      }
      button:active:not(:disabled) {
        transform: scale(0.98);
      }

      /* تأثيرات */
      .fade-in {
        animation: fadeIn 0.5s ease-in;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* تصميم متجاوب */
      @media (max-width: 600px) {
        body {
          padding: 0;
        }
      }

      /* تنسيق خاص للروابط */
      a {
        color: #2EA043;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      /* تنسيق التنبيهات */
      .alert-success {
        background-color: #2EA04333;
        border: 1px solid #2EA043;
        color: #2EA043;
        padding: 10px 16px;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .alert-error {
        background-color: #DA363333;
        border: 1px solid #DA3633;
        color: #DA3633;
        padding: 10px 16px;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .alert-warning {
        background-color: #D2992233;
        border: 1px solid #D29922;
        color: #D29922;
        padding: 10px 16px;
        border-radius: 8px;
        margin-bottom: 12px;
      }

      /* شعار التطبيق (اختياري) */
      .app-logo {
        display: inline-block;
        font-size: 32px;
        font-weight: 700;
        background: linear-gradient(135deg, #2EA043, #58A6FF);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
  </head>
  <body>
    <!-- نقطة ربط React -->
    <div id="root" class="fade-in"></div>

    <!--
      ⚠️ ملاحظة:
      هذا الملف هو الصفحة الأساسية التي يتم تحميلها في المتصفح.
      التطبيق بالكامل يعمل عبر React والذي يتم تحميله من ملف App.js.
    -->
  </body>
  </html>
